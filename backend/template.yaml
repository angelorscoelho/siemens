AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Siemens Energy — Gas Turbine AI Maintenance Assistant
  Serverless backend: HTTP API Gateway + Python Lambda (RAG via Google Gemini)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.11
    Environment:
      Variables:
        GEMINI_API_KEY: !Ref GeminiApiKey
        GEMINI_MODEL: !Ref GeminiModel

Parameters:
  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: >
      Your Google AI Studio (Gemini) API key. This is stored as a CloudFormation
      parameter and injected into Lambda as an environment variable. For production
      use AWS Secrets Manager instead.

  GeminiModel:
    Type: String
    Default: gemini-2.0-flash
    AllowedValues:
      - gemini-2.0-flash
      - gemini-1.5-pro
      - gemini-2.0-flash-thinking-exp
    Description: >
      Gemini model to use. gemini-2.0-flash is recommended for speed and quality
      balance. gemini-1.5-pro offers the highest reasoning quality for complex
      maintenance queries.

  AllowedOrigin:
    Type: String
    Default: '*'
    Description: >
      CORS allowed origin. Set to your Vercel URL (e.g. https://your-app.vercel.app)
      in production. Defaults to '*' for ease of PoC testing.

Resources:

  # ── HTTP API Gateway ───────────────────────────────────────────────────────
  GasTurbineApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 600

  # ── Lambda Function: AI Ask Assistant ─────────────────────────────────────
  AskAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: siemens-poc-ask-assistant
      CodeUri: ask_assistant/
      Handler: app.lambda_handler
      Description: >
        RAG-mock maintenance assistant: retrieves hardcoded turbine manual
        context and queries Google Gemini to produce grounded answers.
      Events:
        AskPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GasTurbineApi
            Path: /ask-assistant
            Method: POST
        AskOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref GasTurbineApi
            Path: /ask-assistant
            Method: OPTIONS

  # ── Lambda Function: Maintenance History ───────────────────────────────────
  MaintenanceHistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: siemens-poc-maintenance-history
      CodeUri: maintenance_history/
      Handler: app.lambda_handler
      Description: >
        Returns structured maintenance history records for a given equipment
        asset (equipment_id query parameter). Records are stored in the Lambda
        function itself for this PoC; in production replace with a DynamoDB
        query. The records are also available as RAG context for the AI
        assistant to answer questions about maintenance patterns and history.
      Events:
        HistoryGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref GasTurbineApi
            Path: /maintenance-history
            Method: GET
        HistoryOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref GasTurbineApi
            Path: /maintenance-history
            Method: OPTIONS

Outputs:
  ApiBaseUrl:
    Description: >
      HTTP API base URL. Append /ask-assistant for the chat endpoint or
      /maintenance-history?equipment_id=GT-01 for maintenance history.
      Copy this value into your frontend .env as VITE_API_URL.
    Value: !Sub 'https://${GasTurbineApi}.execute-api.${AWS::Region}.amazonaws.com'

  AskAssistantFunctionArn:
    Description: ARN of the Ask Assistant Lambda function
    Value: !GetAtt AskAssistantFunction.Arn

  MaintenanceHistoryFunctionArn:
    Description: ARN of the Maintenance History Lambda function
    Value: !GetAtt MaintenanceHistoryFunction.Arn
