AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Siemens Energy — Gas Turbine AI Maintenance Assistant
  Serverless backend: HTTP API Gateway + Python Lambda (RAG mock via OpenAI)

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.11
    Environment:
      Variables:
        OPENAI_API_KEY: !Ref OpenAIApiKey
        OPENAI_MODEL: !Ref OpenAIModel
    Layers:
      - !Ref DependenciesLayer

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: >
      Your OpenAI API key (sk-...). This is stored as a CloudFormation parameter
      and injected into Lambda as an environment variable. For production use
      AWS Secrets Manager instead.

  OpenAIModel:
    Type: String
    Default: gpt-4o-mini
    AllowedValues:
      - gpt-4o-mini
      - gpt-4o
      - gpt-3.5-turbo
    Description: OpenAI model to use for the maintenance assistant.

  AllowedOrigin:
    Type: String
    Default: '*'
    Description: >
      CORS allowed origin. Set to your Vercel URL (e.g. https://your-app.vercel.app)
      in production. Defaults to '*' for ease of PoC testing.

Resources:

  # ── Dependencies Lambda Layer ──────────────────────────────────────────────
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: siemens-poc-dependencies
      Description: openai SDK and dependencies for the maintenance assistant
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.11

  # ── HTTP API Gateway ───────────────────────────────────────────────────────
  GasTurbineApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 600

  # ── Lambda Function ────────────────────────────────────────────────────────
  AskAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: siemens-poc-ask-assistant
      CodeUri: ask_assistant/
      Handler: app.lambda_handler
      Description: >
        RAG-mock maintenance assistant: retrieves hardcoded turbine manual
        context and queries OpenAI to produce grounded answers.
      Events:
        AskPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref GasTurbineApi
            Path: /ask-assistant
            Method: POST
        AskOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref GasTurbineApi
            Path: /ask-assistant
            Method: OPTIONS

  # ── IAM Role is auto-created by SAM when no explicit Role is provided ──────
  # SAM attaches AWSLambdaBasicExecutionRole by default; no extra permissions
  # are needed since the function only calls the OpenAI external API.

Outputs:
  ApiBaseUrl:
    Description: >
      HTTP API base URL. Append /ask-assistant for the chat endpoint.
      Copy this value into your frontend .env as VITE_API_URL.
    Value: !Sub 'https://${GasTurbineApi}.execute-api.${AWS::Region}.amazonaws.com'

  AskAssistantFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt AskAssistantFunction.Arn
